<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>Feng37 Showcase Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>
    <style>
        :root {
            color-scheme: light;
            --bg: oklch(0.98 0.015 95);
            --bg-strong: oklch(0.94 0.035 92);
            --panel: color-mix(in oklab, white 78%, #d7c7ac 22%);
            --panel-strong: color-mix(in oklab, white 60%, #dbc7a0 40%);
            --line: color-mix(in oklab, #5b4630 18%, white 82%);
            --text: oklch(0.27 0.03 62);
            --text-soft: oklch(0.44 0.025 62);
            --accent: oklch(0.62 0.16 52);
            --accent-soft: oklch(0.9 0.05 58);
            --accent-deep: oklch(0.44 0.12 48);
            --shadow: 0 24px 80px rgba(93, 67, 33, 0.14);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --container: min(1440px, calc(100vw - 32px));
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(200, 140, 67, 0.24), transparent 28%),
                radial-gradient(circle at 85% 12%, rgba(120, 155, 137, 0.18), transparent 24%),
                linear-gradient(145deg, var(--bg) 0%, #f8f0e3 52%, #efe5d6 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(91, 70, 48, 0.04) 1px, transparent 1px),
                linear-gradient(rgba(91, 70, 48, 0.04) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.38), transparent 70%);
        }

        button,
        a,
        iframe {
            font: inherit;
        }

        .app-shell {
            width: var(--container);
            margin: 0 auto;
            padding: clamp(20px, 3vw, 36px) 0 36px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            padding: clamp(28px, 4vw, 44px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-xl);
            background:
                linear-gradient(135deg, rgba(255, 250, 243, 0.92), rgba(243, 230, 208, 0.78)),
                linear-gradient(120deg, rgba(255, 255, 255, 0.8), rgba(219, 199, 160, 0.2));
            box-shadow: var(--shadow);
            isolation: isolate;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 320px;
            height: 320px;
            right: -100px;
            top: -120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(197, 120, 49, 0.26), transparent 68%);
            z-index: -1;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(145, 111, 73, 0.14);
            color: var(--text-soft);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: clamp(24px, 3vw, 36px);
            margin-top: 24px;
            align-items: end;
        }

        .hero-copy h1 {
            margin: 0;
            max-width: 11ch;
            font-family: "Playfair Display", serif;
            font-size: clamp(3rem, 8vw, 6.6rem);
            line-height: 0.92;
            letter-spacing: -0.05em;
            font-weight: 700;
        }

        .hero-copy p {
            max-width: 52ch;
            margin: 18px 0 0;
            color: var(--text-soft);
            font-size: clamp(1rem, 2vw, 1.12rem);
            line-height: 1.8;
        }

        .hero-stats {
            display: grid;
            gap: 14px;
        }

        .stat-card {
            padding: 18px 20px;
            border-radius: var(--radius-lg);
            background: rgba(255, 251, 247, 0.82);
            border: 1px solid rgba(123, 90, 60, 0.12);
        }

        .stat-label {
            display: block;
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .stat-value {
            display: block;
            margin-top: 10px;
            font-size: clamp(1.4rem, 3vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
            gap: clamp(18px, 2.4vw, 28px);
            margin-top: 22px;
        }

        .catalog,
        .viewer {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.75);
            background: rgba(255, 250, 244, 0.68);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .catalog {
            padding: 18px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            padding: 8px 6px 18px;
        }

        .section-head h2,
        .viewer-head h2 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: -0.03em;
        }

        .section-head p,
        .viewer-head p {
            margin: 6px 0 0;
            color: var(--text-soft);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        .catalog-list {
            display: grid;
            gap: 10px;
        }

        .project-card {
            position: relative;
            width: 100%;
            padding: 18px;
            border: 0;
            border-radius: var(--radius-md);
            text-align: left;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.62);
            color: inherit;
            border: 1px solid transparent;
            transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
        }

        .project-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(187, 133, 78, 0.24);
            box-shadow: 0 18px 30px rgba(135, 96, 48, 0.1);
        }

        .project-card.active {
            background:
                linear-gradient(135deg, rgba(196, 125, 62, 0.12), rgba(255, 255, 255, 0.88)),
                rgba(255, 255, 255, 0.95);
            border-color: rgba(175, 116, 61, 0.34);
            box-shadow: 0 22px 36px rgba(135, 96, 48, 0.14);
        }

        .project-topline {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .project-category {
            display: inline-flex;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-deep);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .project-status {
            color: var(--text-soft);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .project-card h3 {
            margin: 14px 0 8px;
            font-size: 1.18rem;
            letter-spacing: -0.03em;
        }

        .project-card p {
            margin: 0;
            color: var(--text-soft);
            line-height: 1.65;
            font-size: 0.95rem;
        }

        .viewer {
            min-height: 78vh;
            padding: 18px;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 16px;
        }

        .viewer-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
        }

        .viewer-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .viewer-badge {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(145, 111, 73, 0.14);
            color: var(--text-soft);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .viewer-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 12px 14px;
            border-radius: 20px;
            background: rgba(102, 76, 51, 0.08);
            border: 1px solid rgba(145, 111, 73, 0.12);
        }

        .toolbar-url {
            overflow: hidden;
            color: var(--text-soft);
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .toolbar-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 140px;
            padding: 12px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, #b66734 100%);
            color: #fff9f4;
            font-size: 0.92rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
            box-shadow: 0 18px 28px rgba(182, 103, 52, 0.28);
        }

        .toolbar-action:hover {
            transform: translateY(-1px);
            filter: saturate(1.08);
            box-shadow: 0 22px 34px rgba(182, 103, 52, 0.32);
        }

        .frame-shell {
            position: relative;
            min-height: 0;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(145, 111, 73, 0.16);
            background: linear-gradient(180deg, rgba(255, 252, 248, 0.96), rgba(249, 242, 234, 0.9));
        }

        .frame-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.22), transparent 12%);
            z-index: 2;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 62vh;
            border: none;
            background: white;
        }

        .project-card,
        .hero,
        .catalog,
        .viewer {
            animation: rise 680ms cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1100px) {
            .hero-grid,
            .workspace {
                grid-template-columns: 1fr;
            }

            .viewer {
                min-height: 70vh;
            }
        }

        @media (max-width: 720px) {
            .app-shell {
                width: min(100vw - 20px, 100%);
                padding-top: 10px;
            }

            .hero,
            .catalog,
            .viewer {
                border-radius: 24px;
            }

            .hero-copy h1 {
                max-width: none;
            }

            .viewer-head,
            .viewer-toolbar,
            .section-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .toolbar-action {
                width: 100%;
            }

            iframe {
                min-height: 56vh;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const projects = [
            {
                id: "react-bank",
                name: "React Bank",
                category: "Web App",
                status: "Featured",
                description: "A React banking demo focused on frontend interaction, flow, and interface clarity.",
                url: "https://feng37.fwh.is/ReactFeng37Bank/"
            },
            {
                id: "php-bank",
                name: "PHP Bank",
                category: "Backend",
                status: "Stable",
                description: "A PHP-based banking build showing classic web architecture and data handling patterns.",
                url: "https://feng37.fwh.is/PHPFeng37Bank/"
            },
            {
                id: "expo-course",
                name: "Expo App",
                category: "Mobile",
                status: "Live",
                description: "A React Native and Expo build for viewing cross-platform mobile interface patterns.",
                url: "https://rncoursefeng37.expo.app/"
            },
            {
                id: "supabase-bank",
                name: "Supabase Bank",
                category: "Cloud",
                status: "New Stack",
                description: "A Supabase-powered banking variant centered on modern data infrastructure and realtime services.",
                url: "https://feng37.fwh.is/SupabaseFeng37Bank/"
            },
            {
                id: "wordpress-site",
                name: "WordPress Site",
                category: "CMS",
                status: "Published",
                description: "A content-driven WordPress entry point for publishing, teaching, and structured information.",
                url: "https://feng37.fwh.is/wordpress/"
            },
            {
                id: "enrollment",
                name: "Enrollment System",
                category: "Utility",
                status: "Active",
                description: "An enrollment workflow that highlights form clarity, guided input, and task completion.",
                url: "https://feng37.fwh.is/Enroll3Feng37/"
            },
            {
                id: "udemy",
                name: "Udemy Showcase",
                category: "Learning",
                status: "Curated",
                description: "A learning-focused showcase for course materials and curated educational resources.",
                url: "https://feng37.fwh.is/UdemyFeng37/"
            },
            {
                id: "video",
                name: "Video Library",
                category: "Media",
                status: "Streaming",
                description: "A media library for video content, playback entry points, and structured learning assets.",
                url: "https://feng37.fwh.is/videoFeng37/"
            },
            {
                id: "date-diff",
                name: "Date Diff Tool",
                category: "Tool",
                status: "Useful",
                description: "A compact date-difference utility that demonstrates practical interactive tooling.",
                url: "https://feng37.fwh.is/datediffFeng37/"
            },
            {
                id: "hospital",
                name: "Hospital System",
                category: "System",
                status: "Enterprise",
                description: "A hospital-oriented system view built for denser workflows and information-heavy layouts.",
                url: "https://feng37.fwh.is/Hospital3Feng37"
            },
            {
                id: "destined-throne",
                name: "Destined Throne",
                category: "Creative",
                status: "Storyworld",
                description: "A creative story-driven piece that adds personality and contrast to the broader collection.",
                url: "https://feng37.fwh.is/DestinedThroneFeng37"
            }
        ];

        function App() {
            const defaultProjectId = localStorage.getItem("currentProjectId") || projects[0].id;
            const initialProject = projects.find((item) => item.id === defaultProjectId) || projects[0];
            const [currentProject, setCurrentProject] = React.useState(initialProject);

            const handleProjectChange = (project) => {
                setCurrentProject(project);
                localStorage.setItem("currentProjectId", project.id);
                localStorage.setItem("currentPage", project.url);
            };

            return (
                <div className="app-shell">
                    <section className="hero">
                        <span className="eyebrow">Feng37 Digital Portfolio Nexus</span>
                        <div className="hero-grid">
                            <div className="hero-copy">
                                <h1>Curated work, framed with intent.</h1>
                                <p>
                                    This redesign turns a simple link list into a curated control room.
                                    Visitors can scan categories, understand what each system does, and jump into a live preview without losing context.
                                </p>
                            </div>
                            <div className="hero-stats">
                                <div className="stat-card">
                                    <span className="stat-label">Projects surfaced</span>
                                    <span className="stat-value">{projects.length}</span>
                                </div>
                                <div className="stat-card">
                                    <span className="stat-label">Current focus</span>
                                    <span className="stat-value">{currentProject.name}</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="workspace">
                        <aside className="catalog">
                            <div className="section-head">
                                <div>
                                    <h2>Project Index</h2>
                                    <p>The left side curates the catalog. The right side keeps live preview and direct launch in view.</p>
                                </div>
                                <div className="viewer-badges">
                                    <span className="viewer-badge">2026 UI</span>
                                    <span className="viewer-badge">Editorial</span>
                                </div>
                            </div>
                            <div className="catalog-list">
                                {projects.map((project) => (
                                    <button
                                        key={project.id}
                                        type="button"
                                        className={`project-card ${currentProject.id === project.id ? "active" : ""}`}
                                        onClick={() => handleProjectChange(project)}
                                    >
                                        <div className="project-topline">
                                            <span className="project-category">{project.category}</span>
                                            <span className="project-status">{project.status}</span>
                                        </div>
                                        <h3>{project.name}</h3>
                                        <p>{project.description}</p>
                                    </button>
                                ))}
                            </div>
                        </aside>

                        <main className="viewer">
                            <div className="viewer-head">
                                <div>
                                    <h2>{currentProject.name}</h2>
                                    <p>{currentProject.description}</p>
                                </div>
                                <div className="viewer-badges">
                                    <span className="viewer-badge">{currentProject.category}</span>
                                    <span className="viewer-badge">{currentProject.status}</span>
                                </div>
                            </div>

                            <div className="viewer-toolbar">
                                <div className="toolbar-url">{currentProject.url}</div>
                                <a
                                    className="toolbar-action"
                                    href={currentProject.url}
                                    target="_blank"
                                    rel="noreferrer"
                                >
                                    Open Live Site
                                </a>
                            </div>

                            <div className="frame-shell">
                                <iframe
                                    title={currentProject.name}
                                    src={currentProject.url}
                                    loading="lazy"
                                    referrerPolicy="no-referrer-when-downgrade"
                                ></iframe>
                            </div>
                        </main>
                    </section>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
