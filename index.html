<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>Feng37 Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #050915;
            --bg-2: #071120;
            --panel: rgba(10, 20, 38, 0.88);
            --panel-2: rgba(8, 16, 30, 0.92);
            --line: rgba(116, 214, 255, 0.16);
            --line-strong: rgba(116, 214, 255, 0.34);
            --text: #edf6ff;
            --text-soft: #8ea6c5;
            --accent: #73d7ff;
            --accent-2: #5ef0c2;
            --accent-3: #6d83ff;
            --shadow: 0 26px 90px rgba(0, 0, 0, 0.34);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --container: min(1480px, calc(100vw - 28px));
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(115, 215, 255, 0.16), transparent 24%),
                radial-gradient(circle at 100% 0%, rgba(94, 240, 194, 0.12), transparent 18%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 52%, #060c16 100%);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                linear-gradient(rgba(115, 215, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(115, 215, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 58%, transparent 92%);
        }

        body::after {
            background: linear-gradient(180deg, rgba(115, 215, 255, 0.05), transparent 16%);
        }

        a,
        button,
        iframe {
            font: inherit;
        }

        .app-shell {
            width: var(--container);
            margin: 0 auto;
            padding: clamp(16px, 2.8vw, 34px) 0 28px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            padding: clamp(22px, 4vw, 36px);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            background:
                linear-gradient(140deg, rgba(10, 18, 33, 0.96), rgba(8, 14, 26, 0.88)),
                linear-gradient(140deg, rgba(115, 215, 255, 0.08), transparent 40%);
            box-shadow: var(--shadow);
            isolation: isolate;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(115, 215, 255, 0.34), transparent 34%, rgba(94, 240, 194, 0.18));
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            right: -180px;
            top: -180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(109, 131, 255, 0.24), transparent 68%);
            z-index: -1;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 22px;
            align-items: end;
        }

        .hero-copy {
            max-width: 760px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid rgba(115, 215, 255, 0.18);
            background: rgba(9, 18, 32, 0.76);
            color: var(--accent);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 18px rgba(115, 215, 255, 0.56);
        }

        .hero h1 {
            margin: 18px 0 0;
            font-family: "Orbitron", sans-serif;
            font-size: clamp(2.6rem, 7vw, 5.6rem);
            line-height: 0.93;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 18px 0 0;
            max-width: 46ch;
            color: var(--text-soft);
            font-size: clamp(0.98rem, 2vw, 1.08rem);
            line-height: 1.8;
        }

        .hero-meta {
            display: grid;
            gap: 12px;
        }

        .meta-card {
            min-width: 220px;
            padding: 16px 18px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(115, 215, 255, 0.16);
            background: rgba(9, 18, 32, 0.8);
        }

        .meta-label {
            display: block;
            color: var(--text-soft);
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .meta-value {
            display: block;
            margin-top: 10px;
            font-family: "Orbitron", sans-serif;
            font-size: clamp(1.2rem, 2.5vw, 1.9rem);
            letter-spacing: -0.04em;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 430px) minmax(0, 1fr);
            gap: 18px;
            margin-top: 18px;
        }

        .catalog,
        .viewer {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            background: linear-gradient(180deg, rgba(8, 15, 28, 0.94), rgba(6, 11, 21, 0.9));
            box-shadow: var(--shadow);
        }

        .catalog {
            padding: 16px;
        }

        .catalog::before,
        .viewer::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(115, 215, 255, 0.04), transparent 16%);
        }

        .section-head,
        .viewer-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
        }

        .section-head {
            padding: 4px 2px 16px;
        }

        .section-head h2,
        .viewer-head h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .section-head p,
        .viewer-head p {
            margin: 6px 0 0;
            color: var(--text-soft);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .head-chip {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(115, 215, 255, 0.16);
            background: rgba(10, 18, 32, 0.76);
            color: var(--text-soft);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .catalog-list {
            display: grid;
            gap: 10px;
        }

        .project-card {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(115, 215, 255, 0.1);
            background: rgba(10, 18, 31, 0.84);
            color: inherit;
            text-align: left;
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }

        .project-card:hover {
            transform: translateY(-2px);
            border-color: rgba(115, 215, 255, 0.24);
            background: rgba(12, 21, 37, 0.94);
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.22);
        }

        .project-card.active {
            border-color: rgba(94, 240, 194, 0.3);
            background:
                linear-gradient(135deg, rgba(25, 57, 92, 0.5), rgba(8, 14, 26, 0.96)),
                rgba(10, 18, 31, 0.96);
            box-shadow: 0 0 0 1px rgba(94, 240, 194, 0.08), 0 22px 40px rgba(0, 0, 0, 0.26);
        }

        .project-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid rgba(115, 215, 255, 0.16);
            background: rgba(7, 14, 25, 0.88);
            color: var(--accent);
            font-family: "Orbitron", sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
        }

        .project-card strong {
            display: block;
            margin: 12px 0 0;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }

        .project-url {
            display: block;
            margin-top: 8px;
            color: var(--text-soft);
            font-size: 0.84rem;
            line-height: 1.5;
            word-break: break-all;
        }

        .viewer {
            min-height: 78vh;
            padding: 16px;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 14px;
        }

        .viewer-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(115, 215, 255, 0.12);
            background: rgba(9, 17, 30, 0.84);
        }

        .toolbar-url {
            overflow: hidden;
            color: var(--text-soft);
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .toolbar-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 144px;
            padding: 12px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-3) 100%);
            color: #04101d;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 800;
            transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
            box-shadow: 0 16px 32px rgba(115, 215, 255, 0.24);
        }

        .toolbar-action:hover {
            transform: translateY(-1px);
            filter: saturate(1.08);
        }

        .frame-shell {
            position: relative;
            min-height: 0;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(115, 215, 255, 0.14);
            background: linear-gradient(180deg, rgba(6, 12, 23, 0.98), rgba(9, 18, 31, 0.94));
        }

        .frame-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(115, 215, 255, 0.05), transparent 12%),
                linear-gradient(rgba(255, 255, 255, 0.02), transparent 2px);
            background-size: 100% 100%, 100% 6px;
            z-index: 2;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 64vh;
            border: none;
            background: white;
        }

        .hero,
        .catalog,
        .viewer,
        .project-card {
            animation: rise 720ms cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1120px) {
            .hero-grid,
            .workspace {
                grid-template-columns: 1fr;
            }

            .hero-meta {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .app-shell {
                width: min(100vw - 18px, 100%);
                padding-top: 10px;
            }

            .hero,
            .catalog,
            .viewer {
                border-radius: 24px;
            }

            .hero h1 {
                max-width: none;
            }

            .hero-meta,
            .section-head,
            .viewer-head,
            .viewer-toolbar {
                grid-template-columns: 1fr;
                flex-direction: column;
                align-items: flex-start;
            }

            .toolbar-action {
                width: 100%;
            }

            iframe {
                min-height: 56vh;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const projects = [
            { name: "React Bank", url: "https://feng37.fwh.is/ReactFeng37Bank/" },
            { name: "PHP Bank", url: "https://feng37.fwh.is/PHPFeng37Bank/" },
            { name: "Expo App", url: "https://rncoursefeng37.expo.app/" },
            { name: "Supabase Bank", url: "https://feng37.fwh.is/SupabaseFeng37Bank/" },
            { name: "WordPress Site", url: "https://feng37.fwh.is/wordpress/" },
            { name: "Enrollment System", url: "https://feng37.fwh.is/Enroll3Feng37/" },
            { name: "Udemy Showcase", url: "https://feng37.fwh.is/UdemyFeng37/" },
            { name: "Video Library", url: "https://feng37.fwh.is/videoFeng37/" },
            { name: "Date Diff Tool", url: "https://feng37.fwh.is/datediffFeng37/" },
            { name: "Hospital System", url: "https://feng37.fwh.is/Hospital3Feng37" },
            { name: "Destined Throne", url: "https://feng37.fwh.is/DestinedThroneFeng37" }
        ];

        function App() {
            const savedPage = localStorage.getItem("currentPage") || projects[0].url;
            const initialProject = projects.find((item) => item.url === savedPage) || projects[0];
            const [currentProject, setCurrentProject] = React.useState(initialProject);

            const handlePageChange = (project) => {
                setCurrentProject(project);
                localStorage.setItem("currentPage", project.url);
            };

            return (
                <div className="app-shell">
                    <section className="hero">
                        <div className="hero-grid">
                            <div className="hero-copy">
                                <span className="eyebrow">Feng37 Project Portal</span>
                                <h1>Live preview. Rapid switch.</h1>
                                <p>
                                    保留原本單頁入口與即時預覽的使用方式，只升級成更符合 2026-2027 的科技介面語言。
                                </p>
                            </div>
                            <div className="hero-meta">
                                <div className="meta-card">
                                    <span className="meta-label">Projects</span>
                                    <span className="meta-value">{projects.length}</span>
                                </div>
                                <div className="meta-card">
                                    <span className="meta-label">Current</span>
                                    <span className="meta-value">{currentProject.name}</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="workspace">
                        <aside className="catalog">
                            <div className="section-head">
                                <div>
                                    <h2>Project Switchboard</h2>
                                    <p>維持原本的作品切換功能，僅重做介面呈現與科技風格質感。</p>
                                </div>
                                <span className="head-chip">Realtime Preview</span>
                            </div>
                            <div className="catalog-list">
                                {projects.map((project, index) => (
                                    <button
                                        key={project.url}
                                        type="button"
                                        className={`project-card ${currentProject.url === project.url ? "active" : ""}`}
                                        onClick={() => handlePageChange(project)}
                                    >
                                        <span className="project-index">{String(index + 1).padStart(2, "0")}</span>
                                        <strong>{project.name}</strong>
                                        <span className="project-url">{project.url}</span>
                                    </button>
                                ))}
                            </div>
                        </aside>

                        <main className="viewer">
                            <div className="viewer-head">
                                <div>
                                    <h2>{currentProject.name}</h2>
                                    <p>{currentProject.url}</p>
                                </div>
                                <span className="head-chip">Active Link</span>
                            </div>

                            <div className="viewer-toolbar">
                                <div className="toolbar-url">{currentProject.url}</div>
                                <a
                                    className="toolbar-action"
                                    href={currentProject.url}
                                    target="_blank"
                                    rel="noreferrer"
                                >
                                    Open Site
                                </a>
                            </div>

                            <div className="frame-shell">
                                <iframe
                                    title={currentProject.name}
                                    src={currentProject.url}
                                    loading="lazy"
                                    referrerPolicy="no-referrer-when-downgrade"
                                ></iframe>
                            </div>
                        </main>
                    </section>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
