<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>Feng37 作品展示中心</title>
    <meta name="description" content="Feng37 多專案展示中心，提供即時預覽與快速切換入口。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: oklch(0.16 0.02 250);
            --bg-deep: oklch(0.12 0.02 250);
            --panel: color-mix(in oklab, #0f172a 78%, #11263f 22%);
            --panel-soft: color-mix(in oklab, #101b33 72%, #163050 28%);
            --panel-bright: color-mix(in oklab, #12213b 62%, #1a3b5d 38%);
            --line: rgba(125, 164, 203, 0.18);
            --line-strong: rgba(110, 244, 213, 0.32);
            --text: oklch(0.92 0.01 250);
            --text-soft: oklch(0.74 0.02 245);
            --accent: oklch(0.78 0.14 196);
            --accent-2: oklch(0.72 0.17 150);
            --accent-3: oklch(0.66 0.16 228);
            --danger: oklch(0.74 0.15 30);
            --shadow: 0 28px 90px rgba(0, 0, 0, 0.32);
            --radius-xl: 30px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --container: min(1480px, calc(100vw - 32px));
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 0%, rgba(14, 165, 233, 0.18), transparent 24%),
                radial-gradient(circle at 100% 15%, rgba(34, 197, 94, 0.16), transparent 22%),
                linear-gradient(180deg, #050b16 0%, #09111f 38%, #07111b 100%);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                linear-gradient(rgba(119, 161, 203, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(119, 161, 203, 0.05) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at center, black 55%, transparent 92%);
        }

        body::after {
            background:
                linear-gradient(180deg, rgba(110, 244, 213, 0.05), transparent 18%),
                linear-gradient(180deg, transparent, rgba(79, 105, 255, 0.08));
        }

        a,
        button,
        iframe {
            font: inherit;
        }

        .app-shell {
            width: var(--container);
            margin: 0 auto;
            padding: clamp(18px, 2.6vw, 36px) 0 36px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 4px 16px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--text-soft);
            font-size: 0.92rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-mark {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 24px rgba(110, 244, 213, 0.42);
        }

        .top-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .meta-chip {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(110, 244, 213, 0.16);
            background: rgba(9, 20, 35, 0.72);
            color: var(--text-soft);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .hero {
            position: relative;
            overflow: hidden;
            padding: clamp(26px, 4vw, 40px);
            border: 1px solid rgba(110, 244, 213, 0.12);
            border-radius: var(--radius-xl);
            background:
                linear-gradient(140deg, rgba(10, 19, 34, 0.94), rgba(9, 17, 31, 0.88)),
                linear-gradient(140deg, rgba(35, 211, 238, 0.08), transparent 40%);
            box-shadow: var(--shadow);
            isolation: isolate;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(110, 244, 213, 0.28), rgba(110, 154, 244, 0.1), transparent 66%);
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 520px;
            height: 520px;
            right: -220px;
            top: -220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(49, 125, 255, 0.22), transparent 65%);
            z-index: -1;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: clamp(22px, 3vw, 34px);
            align-items: end;
        }

        .hero-copy {
            max-width: 860px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(10, 20, 35, 0.72);
            border: 1px solid rgba(110, 244, 213, 0.18);
            color: var(--accent);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 18px rgba(110, 244, 213, 0.52);
        }

        .hero-copy h1 {
            margin: 18px 0 0;
            max-width: 9ch;
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(3.2rem, 8vw, 6.8rem);
            line-height: 0.9;
            letter-spacing: -0.06em;
        }

        .hero-copy p {
            max-width: 52ch;
            margin: 20px 0 0;
            color: var(--text-soft);
            font-size: clamp(1rem, 2vw, 1.08rem);
            line-height: 1.8;
        }

        .hero-stats {
            display: grid;
            gap: 14px;
        }

        .stat-card {
            position: relative;
            overflow: hidden;
            padding: 18px 20px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(110, 244, 213, 0.14);
            background: linear-gradient(180deg, rgba(12, 23, 40, 0.95), rgba(11, 18, 31, 0.84));
        }

        .stat-card::after {
            content: "";
            position: absolute;
            inset: auto 0 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.74;
        }

        .stat-label {
            display: block;
            color: var(--text-soft);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .stat-value {
            display: block;
            margin-top: 10px;
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(1.5rem, 3vw, 2.4rem);
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
            gap: clamp(16px, 2.3vw, 26px);
            margin-top: 22px;
        }

        .catalog,
        .viewer {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(110, 244, 213, 0.12);
            background: linear-gradient(180deg, rgba(8, 16, 29, 0.94), rgba(7, 13, 24, 0.9));
            box-shadow: var(--shadow);
        }

        .catalog {
            padding: 18px;
        }

        .catalog::before,
        .viewer::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(110, 244, 213, 0.04), transparent 16%);
        }

        .section-head,
        .viewer-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .section-head {
            padding: 6px 4px 16px;
        }

        .section-head h2,
        .viewer-head h2 {
            margin: 0;
            font-size: 1.02rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .section-head p,
        .viewer-head p {
            margin: 6px 0 0;
            color: var(--text-soft);
            font-size: 0.92rem;
            line-height: 1.65;
        }

        .catalog-list {
            display: grid;
            gap: 10px;
        }

        .project-card {
            position: relative;
            width: 100%;
            padding: 18px;
            border: 1px solid rgba(125, 164, 203, 0.1);
            border-radius: var(--radius-md);
            background: rgba(11, 19, 33, 0.82);
            color: inherit;
            text-align: left;
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }

        .project-card:hover {
            transform: translateY(-2px);
            border-color: rgba(110, 244, 213, 0.24);
            background: rgba(14, 24, 42, 0.94);
            box-shadow: 0 18px 34px rgba(0, 0, 0, 0.24);
        }

        .project-card.active {
            border-color: rgba(110, 244, 213, 0.34);
            background:
                linear-gradient(135deg, rgba(24, 61, 96, 0.42), rgba(10, 18, 31, 0.96)),
                rgba(12, 20, 35, 0.94);
            box-shadow: 0 0 0 1px rgba(110, 244, 213, 0.1), 0 22px 44px rgba(0, 0, 0, 0.28);
        }

        .project-card.active::after {
            content: "";
            position: absolute;
            inset: auto 18px 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .project-topline {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .project-category,
        .project-status,
        .viewer-badge {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            padding: 7px 11px;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .project-category {
            color: var(--accent);
            background: rgba(18, 39, 65, 0.9);
            border: 1px solid rgba(110, 244, 213, 0.16);
        }

        .project-status {
            color: #b7cce3;
            background: rgba(13, 25, 40, 0.94);
            border: 1px solid rgba(125, 164, 203, 0.14);
        }

        .project-card h3 {
            margin: 14px 0 8px;
            font-size: 1.16rem;
            letter-spacing: -0.03em;
        }

        .project-card p {
            margin: 0;
            color: var(--text-soft);
            font-size: 0.95rem;
            line-height: 1.65;
        }

        .viewer {
            min-height: 78vh;
            padding: 18px;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 16px;
        }

        .viewer-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .viewer-badge {
            color: var(--text-soft);
            background: rgba(11, 21, 36, 0.86);
            border: 1px solid rgba(125, 164, 203, 0.14);
        }

        .viewer-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(125, 164, 203, 0.12);
            background: rgba(9, 17, 31, 0.86);
        }

        .toolbar-url {
            overflow: hidden;
            color: var(--text-soft);
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.92rem;
        }

        .toolbar-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 146px;
            padding: 12px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-3) 100%);
            color: #03111f;
            font-size: 0.92rem;
            font-weight: 800;
            text-decoration: none;
            transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
            box-shadow: 0 14px 32px rgba(45, 203, 255, 0.24);
        }

        .toolbar-action:hover {
            transform: translateY(-1px);
            filter: saturate(1.1);
            box-shadow: 0 18px 36px rgba(45, 203, 255, 0.3);
        }

        .frame-shell {
            position: relative;
            min-height: 0;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(110, 244, 213, 0.14);
            background: linear-gradient(180deg, rgba(6, 12, 23, 0.98), rgba(10, 19, 32, 0.96));
        }

        .frame-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(110, 244, 213, 0.06), transparent 12%),
                linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.18));
            z-index: 2;
        }

        .frame-shell::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(rgba(255, 255, 255, 0.02), transparent 2px);
            background-size: 100% 6px;
            opacity: 0.38;
            z-index: 2;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 62vh;
            border: none;
            background: white;
        }

        .hero,
        .catalog,
        .viewer,
        .project-card {
            animation: rise 720ms cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1100px) {
            .hero-grid,
            .workspace {
                grid-template-columns: 1fr;
            }

            .viewer {
                min-height: 70vh;
            }
        }

        @media (max-width: 720px) {
            .app-shell {
                width: min(100vw - 20px, 100%);
                padding-top: 12px;
            }

            .topbar,
            .section-head,
            .viewer-head,
            .viewer-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .hero-copy h1 {
                max-width: none;
            }

            .toolbar-action {
                width: 100%;
            }

            .hero,
            .catalog,
            .viewer {
                border-radius: 24px;
            }

            iframe {
                min-height: 56vh;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const projects = [
            {
                id: "react-bank",
                name: "React Bank",
                category: "網站應用",
                status: "精選",
                description: "以 React 打造的銀行系統展示，重點在前端互動、流程體驗與介面清晰度。",
                url: "https://feng37.fwh.is/ReactFeng37Bank/"
            },
            {
                id: "php-bank",
                name: "PHP Bank",
                category: "後端系統",
                status: "穩定",
                description: "以 PHP 為核心的銀行系統版本，呈現經典 Web 架構與資料處理方式。",
                url: "https://feng37.fwh.is/PHPFeng37Bank/"
            },
            {
                id: "expo-course",
                name: "Expo App",
                category: "行動應用",
                status: "上線中",
                description: "React Native 與 Expo 版本，用來展示跨平台行動介面與操作模式。",
                url: "https://rncoursefeng37.expo.app/"
            },
            {
                id: "supabase-bank",
                name: "Supabase Bank",
                category: "雲端架構",
                status: "新技術",
                description: "整合 Supabase 的銀行系統版本，聚焦現代資料基礎設施與即時服務能力。",
                url: "https://feng37.fwh.is/SupabaseFeng37Bank/"
            },
            {
                id: "wordpress-site",
                name: "WordPress Site",
                category: "內容管理",
                status: "已發布",
                description: "以內容管理為核心的 WordPress 入口，適合教學、發布與資訊整理。",
                url: "https://feng37.fwh.is/wordpress/"
            },
            {
                id: "enrollment",
                name: "Enrollment System",
                category: "實用工具",
                status: "啟用中",
                description: "報名流程系統，強調表單清楚、引導式輸入與任務完成效率。",
                url: "https://feng37.fwh.is/Eroll3Feng37/"
            },
            {
                id: "udemy",
                name: "Udemy Showcase",
                category: "學習資源",
                status: "策展中",
                description: "以課程內容與學習資源整理為主的展示頁，方便集中瀏覽與延伸學習。",
                url: "https://feng37.fwh.is/UdemyFeng37/"
            },
            {
                id: "video",
                name: "Video Library",
                category: "影音媒體",
                status: "播放中",
                description: "影片與影音內容入口，適合整理教學影片、播放頁面與媒體資源。",
                url: "https://feng37.fwh.is/videoFeng37/"
            },
            {
                id: "date-diff",
                name: "Date Diff Tool",
                category: "工具",
                status: "實用",
                description: "日期差計算工具，展示小型但實用的互動功能與工具型介面。",
                url: "https://feng37.fwh.is/datediffFeng37/"
            },
            {
                id: "hospital",
                name: "Hospital System",
                category: "系統平台",
                status: "企業級",
                description: "醫療系統導向的頁面，適合呈現資訊密度較高的流程與管理介面。",
                url: "https://feng37.fwh.is/Hospital3Feng37"
            },
            {
                id: "destined-throne",
                name: "Destined Throne",
                category: "創意作品",
                status: "世界觀",
                description: "帶有敘事感的創意作品頁，為整體作品集加入更鮮明的個性與層次。",
                url: "https://feng37.fwh.is/DestinedThroneFeng37"
            }
        ];

        function App() {
            const defaultProjectId = localStorage.getItem("currentProjectId") || projects[0].id;
            const initialProject = projects.find((item) => item.id === defaultProjectId) || projects[0];
            const [currentProject, setCurrentProject] = React.useState(initialProject);

            const handleProjectChange = (project) => {
                setCurrentProject(project);
                localStorage.setItem("currentProjectId", project.id);
                localStorage.setItem("currentPage", project.url);
            };

            return (
                <div className="app-shell">
                    <header className="topbar">
                        <div className="brand">
                            <span className="brand-mark"></span>
                            <span>Feng37 Project Grid</span>
                        </div>
                        <div className="top-meta">
                            <span className="meta-chip">2026-2027 Interface</span>
                            <span className="meta-chip">Tech Display System</span>
                        </div>
                    </header>

                    <section className="hero">
                        <div className="hero-grid">
                            <div className="hero-copy">
                                <span className="eyebrow">Feng37 數位作品入口</span>
                                <h1>精選作品，一頁掌握。</h1>
                                <p>
                                    以更科技化的介面語言重構作品首頁，保留原有內容與專案結構，
                                    讓訪客能更快辨識每個系統的用途、類型與當前預覽狀態。
                                </p>
                            </div>
                            <div className="hero-stats">
                                <div className="stat-card">
                                    <span className="stat-label">作品數量</span>
                                    <span className="stat-value">{projects.length}</span>
                                </div>
                                <div className="stat-card">
                                    <span className="stat-label">目前焦點</span>
                                    <span className="stat-value">{currentProject.name}</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="workspace">
                        <aside className="catalog">
                            <div className="section-head">
                                <div>
                                    <h2>作品索引</h2>
                                    <p>左側維持作品清單，右側保留即時預覽與外部開啟入口，僅更新視覺表現。</p>
                                </div>
                                <div className="viewer-badges">
                                    <span className="viewer-badge">科技風格</span>
                                    <span className="viewer-badge">即時預覽</span>
                                </div>
                            </div>
                            <div className="catalog-list">
                                {projects.map((project) => (
                                    <button
                                        key={project.id}
                                        type="button"
                                        className={`project-card ${currentProject.id === project.id ? "active" : ""}`}
                                        onClick={() => handleProjectChange(project)}
                                    >
                                        <div className="project-topline">
                                            <span className="project-category">{project.category}</span>
                                            <span className="project-status">{project.status}</span>
                                        </div>
                                        <h3>{project.name}</h3>
                                        <p>{project.description}</p>
                                    </button>
                                ))}
                            </div>
                        </aside>

                        <main className="viewer">
                            <div className="viewer-head">
                                <div>
                                    <h2>{currentProject.name}</h2>
                                    <p>{currentProject.description}</p>
                                </div>
                                <div className="viewer-badges">
                                    <span className="viewer-badge">{currentProject.category}</span>
                                    <span className="viewer-badge">{currentProject.status}</span>
                                </div>
                            </div>

                            <div className="viewer-toolbar">
                                <div className="toolbar-url">{currentProject.url}</div>
                                <a
                                    className="toolbar-action"
                                    href={currentProject.url}
                                    target="_blank"
                                    rel="noreferrer"
                                >
                                    開啟網站
                                </a>
                            </div>

                            <div className="frame-shell">
                                <iframe
                                    title={currentProject.name}
                                    src={currentProject.url}
                                    loading="lazy"
                                    referrerPolicy="no-referrer-when-downgrade"
                                ></iframe>
                            </div>
                        </main>
                    </section>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
